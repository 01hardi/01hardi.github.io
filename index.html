<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Professional portfolio showcasing web development projects and skills" />
    <meta name="keywords" content="web developer, portfolio, react, typescript, frontend, backend" />
    <meta name="author" content="Your Name" />
    
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:title" content="Your Name - Web Developer Portfolio" />
    <meta property="og:description" content="Professional portfolio showcasing web development projects and skills" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://your-portfolio-url.com" />
    
    <!-- Preconnect to External Resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <title>Your Name - Web Developer Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Prevent Flash of Unstyled Content -->
    <script>
      document.documentElement.classList.add('loading');
      window.addEventListener('load', () => {
        document.documentElement.classList.remove('loading');
      });
    </script>
  </body>
</html>
